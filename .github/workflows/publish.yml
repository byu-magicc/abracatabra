name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Validate release tag matches package version
        run: |
          python - <<'PY'
          import pathlib
          import re
          import sys

          tag = "${{ github.event.release.tag_name }}"
          version_file = pathlib.Path("src/abracatabra/__about__.py")
          match = re.search(r'__version__\s*=\s*["\']([^"\']+)["\']', version_file.read_text())

          if match is None:
              sys.exit("Could not find __version__ in src/abracatabra/__about__.py")

          version = match.group(1)
          expected_tag = f"v{version}"

          if tag != expected_tag:
              sys.exit(f"Release tag {tag!r} does not match package version {version!r}; expected {expected_tag!r}")
          PY

      - name: Build package
        run: |
          python -m build

      - name: Check package metadata
        run: |
          twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish distribution
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
